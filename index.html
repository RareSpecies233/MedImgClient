<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MedImg Client</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="titlebar">
        <div class="titlebar-leading-space"></div>
        <div class="tabs" id="tabsContainer"></div>
        <div class="window-controls" id="windowControls">
          <button id="btnClose" class="window-control close" title="关闭" aria-label="关闭">
            <span>×</span>
          </button>
          <button id="btnMin" class="window-control minimize" title="最小化" aria-label="最小化">
            <span>−</span>
          </button>
          <button id="btnMax" class="window-control maximize" title="最大化" aria-label="最大化">
            <span>+</span>
          </button>
        </div>
      </header>

      <main class="content" id="contentArea">
        <section class="home-view" id="homeView">
          <div class="home-card">
            <div class="home-badge">MedImg Client</div>
            <h1>欢迎使用</h1>
            <p id="cliStatusText">正在启动中...</p>
            <p class="home-link-text hidden" id="homeLanHint">
              局域网中可在浏览器中访问
              <span class="lan-address-wrap">【<span id="lanAddressText">http://本机ip:3000</span>】</span>
              <a href="#" id="lanAccessLink">在线使用</a>
            </p>
            <div class="home-actions">
              <button id="btnStart" disabled>正在启动中</button>
              <button id="btnSettings">设置</button>
            </div>
            <div class="quick-actions">
              <button id="btnQuickPreprocess" class="secondary-action">临时快速预处理</button>
              <button id="btnQuickAnalysis" class="secondary-action">临时快速Ai分析</button>
              <button id="btnQuickReconstruction" class="secondary-action">临时快速三维重建</button>
              <button id="btnQuickConsult" class="secondary-action">临时快速Ai问诊</button>
            </div>
          </div>
        </section>
        <section class="tab-pages" id="tabPages"></section>
      </main>
    </div>

    <div class="modal-backdrop hidden" id="settingsModal">
      <div class="modal" role="dialog" aria-modal="true" aria-label="设置">
        <div class="modal-header">
          <h2>设置</h2>
          <button id="closeSettings">✕</button>
        </div>

        <div class="modal-body">
          <div class="service-status-grid setting-group-full">
            <div class="service-status-card">
              <div class="service-status-head">
                <strong>前端服务</strong>
                <span id="frontendRuntimeStatus" class="service-status-badge">未启动</span>
              </div>
              <div class="service-status-actions">
                <button id="toggleFrontendRuntime" type="button" class="secondary-action">启动前端服务</button>
              </div>
            </div>
            <div class="service-status-card">
              <div class="service-status-head">
                <strong>后端服务</strong>
                <span id="backendRuntimeStatus" class="service-status-badge">未启动</span>
              </div>
              <div class="service-status-actions">
                <button id="toggleBackendRuntime" type="button" class="secondary-action">启动后端服务</button>
              </div>
            </div>
          </div>
          <div class="setting-group">
            <label>服务端口号</label>
            <input type="number" id="servicePort" min="1" max="65535" placeholder="3000" />
          </div>
          <div class="setting-group">
            <label>API 端口号</label>
            <input type="number" id="apiPort" min="1" max="65535" placeholder="3001" />
          </div>
          <div class="setting-group">
            <label>模型推理模式</label>
            <select id="modelType">
              <option value="no_prompt">no_prompt</option>
              <option value="pts">pts</option>
              <option value="box">box</option>
              <option value="box+pts">box+pts</option>
              <option value="sota">sota</option>
            </select>
          </div>
          <div class="setting-group">
            <label>ONNX 文件地址</label>
            <div class="file-picker-row">
              <input type="text" id="onnxPath" readonly placeholder="请选择 .onnx 文件" />
              <button id="selectOnnxFile" type="button" class="secondary-action">选择文件</button>
            </div>
          </div>

          <div class="setting-group checkbox-group">
            <label>
              <input type="checkbox" id="autoStartServices" />
              启动时自动启动服务
            </label>
          </div>

          <div class="setting-group checkbox-group">
            <label>
              <input type="checkbox" id="enableGuard" />
              启用守护功能（进程异常退出后自动重启）
            </label>
          </div>

          <div class="setting-group">
            <label>守护重启时间（秒）</label>
            <input type="number" id="guardRestartDelaySeconds" min="0" step="1" placeholder="2" />
          </div>

          <div class="setting-group error-panel hidden" id="serviceErrorPanel">
            <label>服务启动错误详情</label>
            <div class="error-summary" id="serviceErrorSummary"></div>
            <textarea id="serviceErrorDetails" readonly></textarea>
          </div>
        </div>

        <div class="modal-footer">
          <button id="openDeveloperMode" class="ghost-action">开发者模式</button>
          <button id="resetDatabase" class="secondary-action">重置数据库</button>
          <button id="saveSettings">保存设置</button>
        </div>
      </div>
    </div>

    <script src="renderer.js"></script>
  </body>
  </html>
